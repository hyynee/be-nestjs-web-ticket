name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.14.0"

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Lint & type-check
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm exec tsc --noEmit

  # ─────────────────────────────────────────────────────────
  # 2. Unit tests
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      # Minimal env vars needed for NestJS to bootstrap in test mode
      PORT: "9000"
      CORS_ORIGINS: "http://localhost:3000"
      MONGODB_URI: "mongodb://localhost:27017/ticket-test?replicaSet=rs0"
      SECRET_KEY: "ci-test-secret-key-at-least-32-chars-long"
      GOOGLE_CLIENT_ID: "test-google-client-id"
      GOOGLE_CLIENT_SECRET: "test-google-client-secret"
      GOOGLE_CALLBACK_URL: "http://localhost:9000/auth/google/callback"
      FRONTEND_URL: "http://localhost:3000"
      CLOUDINARY_CLOUD_NAME: "test"
      CLOUDINARY_API_KEY: "test"
      CLOUDINARY_API_SECRET: "test"
      STRIPE_SECRET_KEY: "placeholder_stripe_key"
      STRIPE_WEBHOOK_SECRET: "placeholder_webhook_secret"
      PAYPAL_CLIENT_ID: "test"
      PAYPAL_CLIENT_SECRET: "test"
      SMTP_HOST: "smtp.ethereal.email"
      SMTP_PORT: "587"
      SMTP_USER: "test@ethereal.email"
      SMTP_PASS: "test"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      OLLAMA_URL: "http://localhost:11434"
      OLLAMA_MODEL: "llama3"

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: '7.0'
          mongodb-replica-set: rs0
          mongodb-port: 27017

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:cov --passWithNoTests --forceExit

      - name: Check coverage thresholds
        run: |
          node -e "
            const c = require('./coverage/coverage-summary.json');
            const lines      = c.total.lines.pct;
            const branches   = c.total.branches.pct;
            const functions  = c.total.functions.pct;
            const statements = c.total.statements.pct;
            console.log('Coverage: lines=' + lines + '% branches=' + branches + '% functions=' + functions + '% statements=' + statements + '%');
            // Per-metric thresholds — raised from initial baselines (lines: 45 → 50, branches: 37 → 40).
            // Target: reach 70%+ lines / 60%+ branches within 90 days.
            // Payment/ticket critical paths should reach 90%+.
            const THRESHOLDS = { lines: 50, branches: 40, functions: 42, statements: 50 };
            const metrics = { lines, branches, functions, statements };
            const fails = Object.entries(THRESHOLDS).filter(([k, t]) => metrics[k] < t);
            if (fails.length) {
              fails.forEach(([k, t]) => console.error(k + '=' + metrics[k] + '% is below threshold ' + t + '%'));
              process.exit(1);
            }
            console.log('All coverage thresholds passed.');
          "

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # 3. Build
  # ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # 4. Docker image build (no push on PRs)
  # ─────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nestjs-ticket-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  # 5. Security scan — filesystem (Trivy fs)
  # ─────────────────────────────────────────────────────────
  security:
    name: Security scan (fs)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

  # ─────────────────────────────────────────────────────────
  # 6. Security scan — Docker image (Trivy image)
  # Catches CVEs in the base image that fs scan misses.
  # ─────────────────────────────────────────────────────────
  security-image:
    name: Security scan (image)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nestjs-ticket-be:scan-${{ github.sha }}
          load: true
          cache-from: type=gha

      - name: Run Trivy image scanner
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.28.0
        with:
          scan-type: image
          image-ref: nestjs-ticket-be:scan-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
