name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.14.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────
  # Push Docker image to GitHub Container Registry
  # ─────────────────────────────────────────────────────────
  push-image:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  # Smoke-test: verify the pushed image starts correctly
  # ─────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Deploy to production
        run: |
          if [ -z "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            echo "DEPLOY_WEBHOOK_URL not configured — skipping deployment trigger"
            exit 0
          fi
          curl -fsS -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.push-image.outputs.image-digest }}\"}"

      - name: Wait for healthy deploy
        run: |
          if [ -z "${{ secrets.PRODUCTION_HEALTH_URL }}" ]; then
            echo "PRODUCTION_HEALTH_URL not configured — skipping health check"
            exit 0
          fi
          for i in $(seq 1 20); do
            STATUS=$(curl -sf "${{ secrets.PRODUCTION_HEALTH_URL }}/ready" -o /dev/null -w "%{http_code}" || echo 0)
            [ "$STATUS" = "200" ] && echo "Deploy healthy after attempt $i" && exit 0
            echo "Attempt $i: status=$STATUS — waiting 15s..."
            sleep 15
          done
          echo "Deploy health check failed after 5 minutes" && exit 1

      - name: Rollback on deploy failure
        if: failure()
        run: |
          if [ -n "${{ secrets.ROLLBACK_WEBHOOK_URL }}" ]; then
            echo "Triggering rollback for failed deploy..."
            curl -fsS -X POST "${{ secrets.ROLLBACK_WEBHOOK_URL }}" \
              -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"reason\":\"health-check-failed\",\"failed_image\":\"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.push-image.outputs.image-digest }}\",\"ref\":\"${{ github.ref }}\"}"
          else
            echo "ROLLBACK_WEBHOOK_URL not configured — manual rollback required"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_ALERT_WEBHOOK }}" ]; then
            curl -fsS -X POST "${{ secrets.SLACK_ALERT_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"CD FAILED on ${{ github.repository }} ref=${{ github.ref }} — rollback triggered. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
