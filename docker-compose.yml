version: '3.8'

services:
 
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-9000}:9000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: 6379
      REDIS_QUEUE_PASSWORD: ${REDIS_QUEUE_PASSWORD:?REDIS_QUEUE_PASSWORD must be set}
      MONGODB_URI: mongodb://${MONGO_ADMIN_USER:-admin}:${MONGO_ADMIN_PASS:?MONGO_ADMIN_PASS must be set}@mongo1:27017,mongo2:27017,mongo-arbiter:27017/ticket-be?replicaSet=rs0&authSource=admin
    restart: unless-stopped
    depends_on:
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo-arbiter:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - ticket-network

  redis-cache:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    volumes:
      - redis-cache-data:/data
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"${REDIS_PASSWORD:-}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - ticket-network

  redis-queue:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_QUEUE_PASSWORD:?REDIS_QUEUE_PASSWORD must be set}
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis-queue-data:/data
    environment:
      REDISCLI_AUTH: ${REDIS_QUEUE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"${REDIS_QUEUE_PASSWORD:-}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - ticket-network

  mongo1:
    image: mongo:7.0
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --port 27017 --auth --keyFile /etc/mongodb/keyfile
    environment:
      MONGO_ADMIN_USER: ${MONGO_ADMIN_USER:-admin}
      MONGO_ADMIN_PASS: ${MONGO_ADMIN_PASS:?MONGO_ADMIN_PASS must be set}
    volumes:
      - mongo1-data:/data/db
      - ./scripts/mongo-rs-keyfile:/etc/mongodb/keyfile:ro
      - ./scripts/mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
    healthcheck:
      test: mongosh --port 27017 --quiet --eval "db.adminCommand('ping').ok" | grep -q "1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - ticket-network

  mongo2:
    image: mongo:7.0
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --port 27017 --auth --keyFile /etc/mongodb/keyfile
    volumes:
      - mongo2-data:/data/db
      - ./scripts/mongo-rs-keyfile:/etc/mongodb/keyfile:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --port 27017 --quiet --eval 'if (db.adminCommand(\"ping\").ok !== 1) process.exit(1);'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - ticket-network

  mongo-arbiter:
    image: mongo:7.0
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --port 27017 --auth --keyFile /etc/mongodb/keyfile
    volumes:
      - mongo-arbiter-data:/data/db
      - ./scripts/mongo-rs-keyfile:/etc/mongodb/keyfile:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --port 27017 --quiet --eval 'if (db.adminCommand(\"ping\").ok !== 1) process.exit(1);'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    networks:
      - ticket-network

volumes:
  redis-cache-data:
  redis-queue-data:
  mongo1-data:
  mongo2-data:
  mongo1-config:
  mongo2-config:
  mongo-arbiter-data:
  mongo-arbiter-config:

networks:
  ticket-network:
    driver: bridge